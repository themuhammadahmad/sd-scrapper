<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site History | Changes Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/change.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7fa; color: #333; margin: 0; }
        
        .history-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .history-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        
        .back-link:hover { transform: translateX(-5px); }
        .back-link i { margin-right: 8px; }

        .site-title { font-size: 1.8em; font-weight: 700; color: #2d3748; margin: 0; }
        .site-url { color: #718096; word-break: break-all; margin-top: 5px; }

        .timeline { position: relative; margin-top: 40px; padding-left: 50px; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #e2e8f0;
            border-radius: 3px;
        }

        .timeline-item { position: relative; margin-bottom: 50px; }
        
        .timeline-dot {
            position: absolute;
            left: -39px;
            top: 0;
            width: 18px;
            height: 18px;
            background: #667eea;
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            z-index: 1;
        }

        .timeline-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        
        .timeline-content:hover { transform: translateY(-3px); }

        .change-date {
            font-weight: 700;
            color: #4a5568;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .change-summary-pills { display: flex; gap: 10px; }
        
        .pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .pill-added { background: #e6fffa; color: #2d3748; border: 1px solid #b2f5ea; }
        .pill-removed { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
        .pill-updated { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }

        .diff-container { margin-top: 20px; border-top: 1px solid #edf2f7; padding-top: 15px; }
        .diff-section-title { font-size: 0.9em; font-weight: 700; color: #718096; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .staff-card { background: #f8fafc; border: 1px solid #edf2f7; padding: 12px; border-radius: 8px; font-size: 0.9em; }
        .staff-name { font-weight: 600; color: #2d3748; }
        
        .loading-screen { text-align: center; padding: 100px; color: #667eea; }
    </style>
</head>
<body>
    <div class="history-container">
        <a href="/changes" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <div class="history-header" id="headerContent">
            <div class="loading-indicator">
                <i class="fas fa-spinner fa-spin"></i> Loading site info...
            </div>
        </div>

        <div class="timeline" id="historyTimeline">
            <!-- Timeline items will be injected here -->
        </div>
    </div>

    <script src="/js/site-history.js"></script>
</body>
</html>
